<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Umana • Apps Gratis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/styles.css">
    <meta name="theme-color" content="#7c3aed">
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <!-- HEADER -->
    <header class="border-b border-zinc-800 bg-zinc-900 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-violet-500 to-cyan-400 rounded-2xl flex items-center justify-center text-2xl">🚀</div>
                <h1 class="text-3xl font-bold tracking-tighter">Umana Apps</h1>
            </div>
            <input id="searchInput" 
                   type="text" 
                   placeholder="Buscar apps o juegos..." 
                   class="bg-zinc-800 border border-zinc-700 focus:border-violet-500 rounded-3xl px-6 py-3 w-96 outline-none text-sm">
            <button onclick="installPWA()" 
                    class="bg-white text-zinc-900 px-6 py-2.5 rounded-3xl font-semibold text-sm flex items-center gap-2 hover:scale-105 transition">
                <span>Añadir a inicio</span>
            </button>
        </div>

        <!-- CATEGORÍAS -->
        <div class="max-w-6xl mx-auto px-6 pb-4 flex gap-2 overflow-x-auto" id="categoryTabs"></div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
        <h2 id="pageTitle" class="text-4xl font-bold mb-8">Top Apps 🔥</h2>
        
        <div id="appsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
    </main>

    <!-- OFFERWALL MODAL -->
    <div id="offerModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999]">
        <div class="bg-zinc-900 rounded-3xl max-w-lg w-full mx-4 p-8 text-center">
            <h3 class="text-2xl font-bold mb-2">¡Desbloquea la biblioteca!</h3>
            <p class="text-zinc-400 mb-8">Completa 1 tarea rápida (30 segundos) para acceder a todas las apps durante 30 minutos.</p>
            
            <!-- AQUÍ VA TU OFFERWALL (CPAlead) -->
            <div id="offerwallContainer" class="mb-8 min-h-[420px] bg-zinc-800 rounded-2xl flex items-center justify-center">
                <p class="text-zinc-400 text-sm">Cargando tareas...</p>
            </div>

            <button onclick="completeTaskDemo()" 
                    class="w-full bg-gradient-to-r from-violet-500 to-cyan-400 text-white py-4 rounded-3xl font-semibold text-lg">
                Ya completé la tarea
            </button>
            
            <p onclick="closeModal()" class="text-zinc-500 text-xs mt-6 cursor-pointer">O cierra y vuelve más tarde</p>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
